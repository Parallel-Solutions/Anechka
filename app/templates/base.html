<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bitrix24 Export{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/app.css?v=20250626" rel="stylesheet">
</head>
<body class="{% block body_class %}{% endblock %}">
<nav class="navbar navbar-expand-lg {% block navbar_class %}navbar-dark bg-primary mb-4{% endblock %}">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">Bitrix24 Export</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/tomoru-export">Tomoru</a>
            <a class="nav-link" href="/exports">История</a>
            <a class="nav-link" href="/bitrix-import">CRM Импорт</a>
            <a class="nav-link" href="/call-results">Результаты прозвона</a>
            <a class="nav-link" href="/settings">Настройки</a>
        </div>
    </div>
</nav>
<main class="{% block main_class %}container pb-5{% endblock %}">
    {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js?v=20250629"></script>
{% block scripts %}{% endblock %}
</body>
</html>
