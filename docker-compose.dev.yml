# Dev override: hot-reload and source mount. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  db:
    ports:
      - "5433:5432"

  web:
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--timeout-graceful-shutdown",
        "30",
      ]
    volumes:
      - .:/app
      - ./exports:/app/exports
      - ./logs:/app/logs
      - filestorage:/app/filestorage
